<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect width="520" height="280" fill="#ffffff" rx="12"/>
  <rect width="520" height="280" fill="url(#bg-grad)" rx="12" opacity="0.05"/>
  <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f8fafc"/>
    <stop offset="100%" stop-color="#e2e8f0"/>
  </linearGradient>

  <text x="260" y="35" text-anchor="middle" font-family="Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" fill="#0f172a">
    Impact of a Byzantine Attack on Aggregation
  </text>

  <ellipse cx="230" cy="140" rx="70" ry="40" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="165" y="105" font-family="sans-serif" font-size="10" font-weight="600" fill="#3b82f6" opacity="0.8">Honest consensus</text>

  <circle cx="200" cy="220" r="5" fill="#0f172a" filter="url(#shadow)"/>
  <text x="200" y="245" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#64748b">Model (t)</text>

  <g opacity="0.7">
    <line x1="200" y1="220" x2="160" y2="140" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <line x1="200" y1="220" x2="205" y2="130" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <line x1="200" y1="220" x2="235" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <line x1="200" y1="220" x2="265" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  </g>

  <line x1="200" y1="220" x2="420" y2="80" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-red)">
    <title>Malicious vector</title>
  </line>
  <text x="380" y="70" font-family="sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Attack!</text>

  <line x1="200" y1="220" x2="300" y2="110" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow-purple)"/>
  
  <rect x="340" y="160" width="165" height="95" rx="8" fill="white" fill-opacity="0.9" filter="url(#shadow)"/>
  <g transform="translate(355, 180)">
    <line x1="0" y1="5" x2="20" y2="5" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="30" y="9" font-family="sans-serif" font-size="11" fill="#475569">Honest clients</text>
    
    <line x1="0" y1="30" x2="20" y2="30" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
    <text x="30" y="34" font-family="sans-serif" font-size="11" fill="#475569">Byzantine (Outlier)</text>
    
    <line x1="0" y1="55" x2="20" y2="55" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow-purple)"/>
    <text x="30" y="59" font-family="sans-serif" font-size="11" font-weight="600" fill="#7c3aed">Biased average</text>
  </g>
</svg>
